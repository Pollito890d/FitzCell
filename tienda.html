<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda - FitzCell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-product:hover {
            transform: translateY(-4px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-slate-50 text-slate-900">
    <header class="bg-[#0f172a] text-white sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-3" onclick="location.href='index.html'">
                <span class="text-2xl">📱</span>
                <h1 class="text-xl font-bold tracking-tighter">FITZCELL<span class="text-emerald-400">.</span></h1>
            </div>
            <nav class="hidden md:flex gap-8 text-sm font-medium">
                <a href="index.html" class="hover:text-emerald-400 transition-colors">Inicio</a>
                <a href="tienda.html" class="text-emerald-400 transition-colors">Tienda</a>
                <a href="rastreo.html" class="hover:text-emerald-400 transition-colors">Rastreo</a>
                <a href="nosotros.html" class="hover:text-emerald-400 transition-colors">Nosotros</a>
            </nav>
            <div class="flex items-center gap-5">
                <a href="carrito.html"
                    class="relative p-2 hover:bg-white/10 rounded-full transition-all flex items-center gap-2">
                    <span>🛒</span>
                    <span id="cart-count"
                        class="bg-emerald-500 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center border-2 border-[#0f172a]">0</span>
                </a>
                <a href="login.html"
                    class="hidden sm:block text-xs border border-white/20 px-4 py-2 rounded-lg hover:bg-white hover:text-slate-900 transition-all font-bold uppercase tracking-wider">Acceso
                    Staff</a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto py-12 px-6">
        <h2 class="text-3xl font-bold mb-8">Nuestros Accesorios</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="productos-container"></div>
    </main>

    <footer class="bg-white border-t border-slate-200 pt-16 pb-8 mt-12">
        <div class="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-4 gap-12">
            <div>
                <div class="flex items-center gap-2 mb-6">
                    <span class="text-xl">📱</span>
                    <h1 class="text-lg font-bold">FITZCELL</h1>
                </div>
                <p class="text-slate-500 text-sm leading-relaxed">Expertos en San Pablo Huixtepec.</p>
            </div>
            <div>
                <h4 class="font-bold mb-6 text-slate-800">Soporte</h4>
                <ul class="space-y-4 text-sm text-slate-500">
                    <li><a href="politicas.html" class="hover:text-emerald-600">Políticas de Garantía</a></li>
                    <li><a href="faq.html" class="hover:text-emerald-600">Preguntas Frecuentes</a></li>
                </ul>
            </div>
            <div>
                <h4 class="font-bold mb-6 text-slate-800">Ubicación</h4>
                <a href="https://maps.app.goo.gl/fnMABRnQGftYW78h9">
                    <p class="text-sm text-slate-500">📍 Av. Independencia #12, San Pablo Huixtepec, Oax.</p>
                </a>
            </div>
            <div>
                <h4 class="font-bold mb-6 text-slate-800">Contacto</h4>
                <p class="text-sm text-slate-500">📞 951 123 4567</p>
            </div>
        </div>
    </footer>

    <script>
        const productos = [
            { id: 1, nombre: 'Cargador Original Samsung 25W', cat: 'Cargadores', precio: 450, stock: 12, img: '🔌', desc: 'Carga super rápida certificada para modelos S21, S22, S23.' },
            { id: 2, nombre: 'Funda Rugged Armor iPhone 15', cat: 'Fundas', precio: 320, stock: 5, img: '🛡️', desc: 'Protección de grado militar contra caídas.' },
            { id: 3, nombre: 'Audífonos Lenovo LP40 Pro', cat: 'Audio', precio: 550, stock: 8, img: '🎧', desc: 'Bluetooth 5.1, cancelación de ruido y sonido Hi-Fi.' },
            { id: 4, nombre: 'Mica Cerámica Flexible IR', cat: 'Micas', precio: 150, stock: 40, img: '💎', desc: 'Privacidad lateral y alta resistencia a impactos.' },
            { id: 5, nombre: 'Powerbank 10,000mAh Slim', cat: 'Cargadores', precio: 680, stock: 4, img: '🔋', desc: 'Diseño ultra delgado para llevar en el bolsillo.' }
        ];

        function renderProductos() {
            const container = document.getElementById('productos-container');
            container.innerHTML = productos.map(p => `
                <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm card-product">
                    <div class="h-40 bg-slate-50 rounded-xl flex items-center justify-center text-6xl mb-4">${p.img}</div>
                    <h4 class="font-bold text-lg mb-1">${p.nombre}</h4>
                    <p class="text-sm text-slate-500 mb-4">${p.desc}</p>
                    <div class="flex justify-between items-center">
                        <span class="text-emerald-600 font-bold text-xl">$${p.precio}</span>
                        <button onclick="agregarAlCarrito(${p.id})" class="bg-slate-900 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-emerald-600 transition-colors">Añadir</button>
                    </div>
                </div>
            `).join('');
        }

        function agregarAlCarrito(id) {
            let carrito = JSON.parse(localStorage.getItem('carrito')) || [];
            const producto = productos.find(p => p.id === id);
            carrito.push(producto);
            localStorage.setItem('carrito', JSON.stringify(carrito));
            localStorage.setItem('cartCount', carrito.length);
            document.getElementById('cart-count').innerText = carrito.length;
            alert(`${producto.nombre} agregado al carrito`);
        }

        document.getElementById('cart-count').innerText = localStorage.getItem('cartCount') || '0';
        renderProductos();
    </script>
</body>

</html>
