<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda - FitzCell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                brand: { DEFAULT: '#07B76B', dark: '#069D5B', light: '#23C181' },
                base: '#0a0a0b'
              }
            }
          }
        }
    </script>
    <style>
        .card-product:hover {
            transform: translateY(-4px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/svg+xml" href="media/images/fitzcell_logo.svg" />
</head>

<body class="bg-base text-gray-100">
    <nav class="fixed top-0 w-full z-50 bg-base/90 backdrop-blur border-b border-gray-800/50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 group">
                <img src="media/images/fitzcell_logo.svg" alt="FitzCell Logo" class="h-9 w-auto hover:opacity-80 transition object-contain">
                
            </a>
            <div class="hidden md:flex items-center gap-6 text-sm font-medium text-gray-400">
                <a href="index.html" class="hover:text-brand transition">Inicio</a>
                <a href="tienda.html" class="text-brand">Tienda</a>
                <a href="carrito.html" class="hover:text-brand transition flex items-center gap-1">Carrito <span id="nav-cart-count" class="bg-brand text-gray-950 text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span></a>
                <a href="rastreo.html" class="hover:text-brand transition">Rastrear equipo</a>
                <a href="faq.html" class="hover:text-brand transition">Políticas</a>
                <a href="rastreo.html" class="ml-2 px-4 py-2 bg-brand text-gray-950 font-semibold rounded-lg btn-neon">📱 Buscar mi equipo</a>
            </div>
            <button class="md:hidden text-gray-400 hover:text-white" onclick="document.getElementById('mobileMenu').classList.toggle('hidden')">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
        </div>
        <div id="mobileMenu" class="hidden md:hidden bg-gray-900 border-t border-gray-800 px-4 pb-4">
            <a href="index.html" class="block py-2 text-gray-300 text-sm font-medium hover:text-brand">Inicio</a>
            <a href="tienda.html" class="block py-2 text-brand text-sm font-medium">Tienda</a>
            <a href="carrito.html" class="block py-2 text-gray-300 text-sm font-medium hover:text-brand flex items-center gap-2">Carrito <span id="mobile-nav-cart-count" class="bg-brand text-gray-950 text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span></a>
            <a href="rastreo.html" class="block py-2 text-gray-300 text-sm font-medium hover:text-brand">Rastrear equipo</a>
            <a href="faq.html" class="block py-2 text-gray-300 text-sm font-medium hover:text-brand">Políticas</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto py-24 px-4 min-h-screen">
        <div class="text-center mb-10 fade-in">
            <div class="text-5xl mb-4">🛍️</div>
            <h2 class="text-3xl md:text-4xl font-extrabold mb-3">Nuestros <span class="text-brand">Accesorios</span></h2>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="productos-container"></div>
    </main>

    <footer class="bg-base border-t border-gray-800 py-8">
        <div class="max-w-6xl mx-auto px-4 flex flex-col md:flex-row items-center justify-between gap-4 text-sm text-gray-500">
            <div class="flex items-center gap-2 font-semibold text-white">
                <img src="media/images/fitzcell_logo.svg" alt="FitzCell Logo" class="h-7 w-auto opacity-90 object-contain">
                FitzCell
            </div>
            <div>© 2026 FitzCell · Todos los derechos reservados</div>
            <div class="flex gap-4">
                <a href="rastreo.html" class="hover:text-brand transition">Rastrear equipo</a>
                <a href="faq.html" class="hover:text-brand transition">Políticas</a>
            </div>
        </div>
    </footer>

    <script>
        let productos = [];

        async function cargarProductos() {
            try {
                const res = await fetch('http://localhost:3000/api/productos');
                if(res.ok) {
                    productos = await res.json();
                    renderProductos();
                }
            } catch (error) {
                console.error('Error cargando productos', error);
                document.getElementById('productos-container').innerHTML = '<p class="text-red-500">Error al cargar el catálogo.</p>';
            }
        }

        function renderProductos() {
            const container = document.getElementById('productos-container');
            if (productos.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-20 text-center">
                        <div class="text-6xl mb-4">📭</div>
                        <h3 class="text-xl font-bold text-gray-400">Próximamente más productos</h3>
                        <p class="text-gray-500 mt-2">Estamos actualizando nuestro catálogo. ¡Vuelve pronto!</p>
                    </div>
                `;
                return;
            }
            container.innerHTML = productos.map(p => `
                <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl shadow-sm card-product hover:border-brand/50 transition">
                    <div class="h-40 bg-gray-800/50 rounded-xl flex items-center justify-center text-6xl mb-4">${p.imagen_url || '📦'}</div>
                    <h4 class="font-bold text-lg mb-1 text-white">${p.nombre}</h4>
                    <p class="text-sm text-gray-400 mb-4">${p.descripcion || ''}</p>
                    <div class="flex justify-between items-center">
                        <span class="text-brand font-bold text-xl">$${p.precio}</span>
                        <button onclick="agregarAlCarrito(${p.id})" class="bg-brand text-gray-950 px-4 py-2 rounded-lg text-sm font-bold btn-neon">Añadir</button>
                    </div>
                </div>
            `).join('');
        }

        function agregarAlCarrito(id) {
            let carrito = JSON.parse(localStorage.getItem('carrito')) || [];
            const producto = productos.find(p => p.id === id);
            carrito.push(producto);
            localStorage.setItem('carrito', JSON.stringify(carrito));
            localStorage.setItem('cartCount', carrito.length);
            actualizarCartCount(carrito.length);
            alert(`${producto.nombre} agregado al carrito`);
        }

        function actualizarCartCount(count) {
            const navCart = document.getElementById('nav-cart-count');
            const mobileNavCart = document.getElementById('mobile-nav-cart-count');
            if(navCart) navCart.innerText = count;
            if(mobileNavCart) mobileNavCart.innerText = count;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const count = localStorage.getItem('cartCount') || '0';
            actualizarCartCount(count);
            cargarProductos();
        });
    </script>
</body>

</html>
