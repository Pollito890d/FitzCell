<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - FitzCell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                brand: { DEFAULT: '#07B76B', dark: '#069D5B', light: '#23C181' },
                base: '#0a0a0b'
              }
            }
          }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/svg+xml" href="media/images/fitzcell_logo.svg" />
</head>

<body class="bg-base text-gray-100 min-h-screen">
    <nav class="fixed top-0 w-full z-50 bg-base/90 backdrop-blur border-b border-gray-800/50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 group">
                <img src="media/images/fitzcell_logo.svg" alt="FitzCell Logo" class="h-9 w-auto hover:opacity-80 transition object-contain">
            </a>
            <div class="hidden md:flex items-center gap-6 text-sm font-medium text-gray-400">
                <a href="index.html" class="hover:text-brand transition">Inicio</a>
                <a href="tienda.html" class="hover:text-brand transition">Tienda</a>
                <a href="carrito.html" class="text-brand flex items-center gap-1">Carrito <span id="nav-cart-count" class="bg-brand text-gray-950 text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span></a>
                <a href="rastreo.html" class="hover:text-brand transition">Rastrear equipo</a>
                <a href="faq.html" class="hover:text-brand transition">Políticas</a>
                <a href="rastreo.html" class="ml-2 px-4 py-2 bg-brand text-gray-950 font-semibold rounded-lg btn-neon">📱 Buscar mi equipo</a>
            </div>
            <button class="md:hidden text-gray-400 hover:text-white" onclick="document.getElementById('mobileMenu').classList.toggle('hidden')">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
        </div>
        <div id="mobileMenu" class="hidden md:hidden bg-gray-900 border-t border-gray-800 px-4 pb-4">
            <a href="index.html" class="block py-2 text-gray-300 text-sm font-medium hover:text-brand">Inicio</a>
            <a href="tienda.html" class="block py-2 text-gray-300 text-sm font-medium hover:text-brand">Tienda</a>
            <a href="carrito.html" class="block py-2 text-brand text-sm font-medium flex items-center gap-2">Carrito <span id="mobile-nav-cart-count" class="bg-brand text-gray-950 text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span></a>
            <a href="rastreo.html" class="block py-2 text-gray-300 text-sm font-medium hover:text-brand">Rastrear equipo</a>
            <a href="faq.html" class="block py-2 text-gray-300 text-sm font-medium hover:text-brand">Políticas</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto py-24 px-4">
        <div class="text-center mb-10 fade-in">
            <div class="text-5xl mb-4">🛒</div>
            <h2 class="text-3xl md:text-4xl font-extrabold mb-8 text-white">Tu <span class="text-brand">Carrito</span></h2>
        </div>
        <div id="carrito-contenido" class="bg-gray-900 p-8 rounded-3xl border border-gray-800 shadow-xl shadow-black/20"></div>
    </main>

    <footer class="bg-base border-t border-gray-800 py-8">
        <div class="max-w-6xl mx-auto px-4 flex flex-col md:flex-row items-center justify-between gap-4 text-sm text-gray-500">
            <div class="flex items-center gap-2 font-semibold text-white">
                <img src="media/images/fitzcell_logo.svg" alt="FitzCell Logo" class="h-7 w-auto opacity-90 object-contain">
                FitzCell
            </div>
            <div>© 2026 FitzCell · Todos los derechos reservados</div>
            <div class="flex gap-4">
                <a href="rastreo.html" class="hover:text-brand transition">Rastrear equipo</a>
                <a href="faq.html" class="hover:text-brand transition">Políticas</a>
            </div>
        </div>
    </footer>

    <script>
        function actualizarCartCount(count) {
            const navCart = document.getElementById('nav-cart-count');
            const mobileNavCart = document.getElementById('mobile-nav-cart-count');
            if(navCart) navCart.innerText = count;
            if(mobileNavCart) mobileNavCart.innerText = count;
        }

        function renderCarrito() {
            const container = document.getElementById('carrito-contenido');
            let carrito = JSON.parse(localStorage.getItem('carrito')) || [];
            const total = carrito.reduce((acc, item) => acc + item.precio, 0);

            if (carrito.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center py-8">No hay productos en tu carrito</p>';
            } else {
                container.innerHTML = `
                    <div class="grid md:grid-cols-2 gap-8">
                        <div>
                            <h3 class="text-xl font-bold mb-4 text-white">Artículos</h3>
                            <div class="space-y-4 mb-8">
                                ${carrito.map((item, index) => `
                                    <div class="flex justify-between items-center border-b border-gray-800 pb-4">
                                        <div>
                                            <p class="font-bold text-white">${item.nombre}</p>
                                            <p class="text-sm text-gray-400">$${item.precio}</p>
                                        </div>
                                        <button onclick="eliminarDelCarrito(${index})" class="text-rose-400 hover:text-rose-500 text-sm transition">Eliminar</button>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="text-xl font-bold flex justify-between text-white">
                                <span>Total:</span>
                                <span class="text-brand">$${total}</span>
                            </div>
                        </div>
                        <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-lg shadow-black/10">
                            <h3 class="text-xl font-bold mb-4 text-white">Tus Datos</h3>
                            <form id="formCheckout" onsubmit="procesarCompra(event)" class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-400 mb-1">Nombre completo *</label>
                                    <input type="text" id="c-nombre" required class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-2 text-white placeholder-gray-600 focus:outline-none input-fitz"/>
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-sm font-medium text-gray-400 mb-1">Teléfono *</label>
                                        <input type="tel" id="c-telefono" required class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-2 text-white placeholder-gray-600 focus:outline-none input-fitz"/>
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-400 mb-1">Email</label>
                                        <input type="email" id="c-email" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-2 text-white placeholder-gray-600 focus:outline-none input-fitz"/>
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-400 mb-1">Dirección de envío *</label>
                                    <input type="text" id="c-direccion" required placeholder="Calle, número, colonia..." class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-2 text-white placeholder-gray-600 focus:outline-none input-fitz"/>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-400 mb-1">Método de pago</label>
                                    <select id="c-pago" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-2 text-white focus:outline-none input-fitz">
                                        <option value="Efectivo contra entrega">Efectivo contra entrega</option>
                                        <option value="Transferencia">Transferencia previa</option>
                                        <option value="Tarjeta en tienda">Pago en tienda</option>
                                    </select>
                                </div>
                                <div id="checkoutMsg" class="hidden text-sm p-3 rounded-lg mb-4 mt-4 text-center"></div>
                                <button type="submit" id="btnProcesar" class="w-full bg-brand text-gray-950 px-6 py-3 rounded-xl font-bold btn-neon mt-6">Confirmar Pedido</button>
                            </form>
                        </div>
                    </div>
                `;
            }
            actualizarCartCount(carrito.length);
        }

        function eliminarDelCarrito(index) {
            let carrito = JSON.parse(localStorage.getItem('carrito')) || [];
            carrito.splice(index, 1);
            localStorage.setItem('carrito', JSON.stringify(carrito));
            localStorage.setItem('cartCount', carrito.length);
            actualizarCartCount(carrito.length);
            renderCarrito();
        }

        async function procesarCompra(e) {
            e.preventDefault();
            const btn = document.getElementById('btnProcesar');
            const msg = document.getElementById('checkoutMsg');
            btn.disabled = true;
            btn.textContent = 'Procesando...';
            
            let carrito = JSON.parse(localStorage.getItem('carrito')) || [];
            if(carrito.length === 0) return;

            const payload = {
                cliente_nombre: document.getElementById('c-nombre').value,
                cliente_telefono: document.getElementById('c-telefono').value,
                cliente_email: document.getElementById('c-email').value,
                direccion_envio: document.getElementById('c-direccion').value,
                metodo_pago: document.getElementById('c-pago').value,
                total: carrito.reduce((acc, item) => acc + (parseFloat(item.precio)||0), 0),
                items: carrito.map(i => ({ producto_id: i.id, cantidad: 1, precio: i.precio }))
            };

            try {
                const res = await fetch('http://localhost:3000/api/pedidos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if(res.ok) {
                    msg.className = 'text-sm p-3 rounded-lg text-brand bg-brand/10 border border-brand/20 mt-4 text-center';
                    msg.innerHTML = '✅ ¡Pedido confirmado! Te contactaremos pronto.';
                    msg.classList.remove('hidden');
                    
                    localStorage.removeItem('carrito');
                    localStorage.setItem('cartCount', '0');
                    actualizarCartCount(0);
                    
                    setTimeout(() => {
                        window.location.href = 'tienda.html';
                    }, 3000);
                } else {
                    throw new Error('Error al procesar el pedido');
                }
            } catch (error) {
                console.error(error);
                msg.className = 'text-sm p-3 rounded-lg text-rose-400 bg-rose-950/30 border border-rose-800/50 mt-4 text-center';
                msg.innerHTML = '❌ Ocurrió un error. Inténtalo de nuevo.';
                msg.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Confirmar Pedido';
            }
        }

        renderCarrito();
    </script>
</body>

</html>
