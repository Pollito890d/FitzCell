      theme: { extend: { colors: { brand: { DEFAULT: '#07B76B', dark: '#069D5B', light: '#23C181' }, base: '#0a0a0b' } } }

</head>
<body class="bg-base text-gray-100 min-h-screen flex items-center justify-center p-4">
  <!-- Regresar -->
  <a href="index.html" class="absolute top-6 left-6 flex items-center gap-2 text-gray-400 hover:text-white transition">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
    Volver al sitio
  </a>

  <div class="bg-gray-900 border border-gray-800 rounded-3xl p-8 md:p-12 shadow-2xl w-full max-w-md relative overflow-hidden">
    <div class="absolute -top-10 -right-10 w-32 h-32 bg-brand rounded-full blur-3xl opacity-20"></div>

    <div class="text-center mb-8 relative z-10">
      <img src="media/images/fitzcell_logo.svg" alt="FitzCell Logo" class="h-10 w-auto mx-auto mb-4">
      <h2 class="text-2xl font-bold">Acceso al <span class="text-brand">Sistema</span></h2>
      <p class="text-sm text-gray-400 mt-2">Ingresa tus credenciales de empleado</p>
    </div>

    <form id="loginForm" class="space-y-5 relative z-10">
      <div>
        <label class="block text-sm font-medium text-gray-400 mb-1">Correo Electrónico</label>
        <input type="email" id="email" required class="w-full bg-gray-950 border border-gray-700 rounded-xl px-4 py-3 text-white focus:border-brand outline-none transition" placeholder="empleado@fitzcell.com">
      </div>
            <div>
        <label class="block text-sm font-medium text-gray-400 mb-1">Contraseña</label>
        <div class="relative">
          <input type="password" id="password" required class="w-full bg-gray-950 border border-gray-700 rounded-xl px-4 py-3 pr-12 text-white focus:border-brand outline-none transition" placeholder="********">
          <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-500 hover:text-white transition cursor-pointer">
            <svg id="eyeIcon" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
          </button>
        </div>
      </div>
      <div id="loginMsg" class="hidden text-sm p-3 rounded-lg text-center font-medium"></div>
      <button type="submit" id="btnLogin" class="w-full py-3 bg-brand text-gray-950 font-bold rounded-xl hover:bg-brand-light transition" style="box-shadow: 0 0 15px rgba(7,183,107,0.4);">
        Iniciar Sesión
      </button>
    </form>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btnLogin');
      const msg = document.getElementById('loginMsg');
      
      btn.innerText = 'Verificando...';
      btn.disabled = true;
      msg.classList.add('hidden');
      
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          msg.innerText = data.message || 'Error de credenciales';
          msg.classList.remove('hidden', 'bg-green-900', 'text-green-300');
          msg.classList.add('bg-red-900', 'text-red-300');
          btn.innerText = 'Iniciar Sesión';
          btn.disabled = false;
          return;
        }
        
        // Guardar token y rol
        localStorage.setItem('fitzcell_token', data.token);
        localStorage.setItem('fitzcell_rol', data.rol);
        localStorage.setItem('fitzcell_nombre', data.nombre);
        
        msg.innerText = 'Acceso Correcto. Redirigiendo...';
        msg.classList.remove('hidden', 'bg-red-900', 'text-red-300');
        msg.classList.add('bg-green-900', 'text-green-300');
        
        // Redirigir según el rol
        setTimeout(() => {
          if (data.rol === 'admin' || data.rol === 'encargado') window.location.href = 'admin/dashboard_encargado.html';
          else if (data.rol === 'tecnico') window.location.href = 'admin/dashboard_tecnico.html';
          else if (data.rol === 'ventas') window.location.href = 'admin/dashboard_ventas.html';
          else window.location.href = 'index.html';
        }, 1000);
        
      } catch (err) {
        msg.innerText = 'Error de conexión con el servidor';
        msg.classList.remove('hidden', 'bg-green-900', 'text-green-300');
        msg.classList.add('bg-red-900', 'text-red-300');
        btn.innerText = 'Iniciar Sesión';
        btn.disabled = false;
      }
    });
      document.getElementById('togglePassword').addEventListener('click', () => {
      const pwdInput = document.getElementById('password');
      const eyeIcon = document.getElementById('eyeIcon');
      if (pwdInput.type === 'password') {
        pwdInput.type = 'text';
        eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />';
      } else {
        pwdInput.type = 'password';
        eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />';
      }
    });
  </script>
</body>
</html>
