<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Staff - FitzCell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-slate-900">
    <div class="h-screen flex flex-col items-center justify-center text-white p-6">
        <div class="bg-white/10 p-10 rounded-3xl border border-white/10 w-full max-w-sm text-center backdrop-blur-sm">
            <div class="flex items-center justify-center gap-2 mb-8">
                <span class="text-3xl">📱</span>
                <h1 class="text-2xl font-bold">FITZCELL<span class="text-emerald-400">.</span></h1>
            </div>
            <h2 class="text-xl font-bold mb-6 text-emerald-400 uppercase tracking-widest">Acceso Staff</h2>

            <form onsubmit="handleLogin(event)">
                <input type="text" id="username" placeholder="Usuario"
                    class="w-full bg-white/5 border border-white/10 p-3 rounded-xl mb-4 outline-none focus:border-emerald-500 text-white"
                    required>
                <input type="password" id="password" placeholder="Contraseña"
                    class="w-full bg-white/5 border border-white/10 p-3 rounded-xl mb-6 outline-none focus:border-emerald-500 text-white"
                    required>
                <button type="submit"
                    class="w-full bg-emerald-500 py-3 rounded-xl font-bold mb-4 hover:bg-emerald-600 transition-colors">Ingresar</button>
            </form>

            <button onclick="location.href='index.html'"
                class="text-xs text-slate-400 hover:text-white transition-colors">Regresar al portal</button>
        </div>

        <div id="error-message" class="mt-4 text-rose-400 text-sm hidden"></div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');

            // Credenciales de ejemplo
            if (username === 'admin' && password === 'fitzcell2026') {
                alert('¡Bienvenido al panel de administración!');
                // Aquí redirigirías al panel de admin
                // location.href = 'admin.html';
            } else {
                errorDiv.classList.remove('hidden');
                errorDiv.textContent = 'Usuario o contraseña incorrectos';
            }
        }
    </script>
</body>

</html>
