<!DOCTYPE html>
<html lang="es" class="bg-gray-950">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Reparación - FitzCell Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                brand: { DEFAULT: '#07B76B', dark: '#069D5B', light: '#23C181' },
                base: '#0a0a0b'
              }
            }
          }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="icon" type="image/svg+xml" href="../media/images/fitzcell_logo.svg" />
</head>

<body class="p-8 bg-base text-gray-100 min-h-screen">
    <div class="max-w-3xl mx-auto">
        <div class="flex items-center gap-4 mb-8">
            <a href="admin-reparaciones.html" class="text-2xl hover:text-brand transition-colors">←</a>
            <h2 class="text-3xl font-bold">Nueva Orden de Reparación</h2>
        </div>

        <div class="bg-gray-900 p-8 rounded-3xl shadow-lg shadow-black/20 border border-gray-800">
            <form onsubmit="guardarReparacion(event)">
                <div class="space-y-6">
                    <!-- Información del cliente -->
                    <div>
                        <h3 class="font-bold text-lg mb-4 text-white">Información del Cliente</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-bold text-gray-400 mb-2">Nombre completo *</label>
                                <input type="text" required class="w-full p-3 bg-gray-800 border border-gray-700 rounded-xl text-white focus:outline-none input-fitz"
                                    placeholder="Ej: Juan Pérez">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-400 mb-2">Teléfono *</label>
                                <input type="tel" required class="w-full p-3 bg-gray-800 border border-gray-700 rounded-xl text-white focus:outline-none input-fitz"
                                    placeholder="951 123 4567">
                            </div>
                            <div class="md:col-span-2">
                                <label class="block text-sm font-bold text-gray-400 mb-2">Email</label>
                                <input type="email" class="w-full p-3 bg-gray-800 border border-gray-700 rounded-xl text-white focus:outline-none input-fitz"
                                    placeholder="cliente@email.com">
                            </div>
                        </div>
                    </div>

                    <!-- Información del equipo -->
                    <div class="pt-4 border-t border-gray-800">
                        <h3 class="font-bold text-lg mb-4 text-white">Información del Equipo</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-bold text-gray-400 mb-2">Tipo de equipo *</label>
                                <select required class="w-full p-3 bg-gray-800 border border-gray-700 rounded-xl text-white focus:outline-none input-fitz">
                                    <option value="">Seleccionar</option>
                                    <option>Smartphone</option>
                                    <option>Tablet</option>
                                    <option>Laptop</option>
                                    <option>Smartwatch</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-400 mb-2">Marca *</label>
                                <input type="text" required class="w-full p-3 bg-gray-800 border border-gray-700 rounded-xl text-white focus:outline-none input-fitz"
                                    placeholder="Ej: Samsung">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-400 mb-2">Modelo *</label>
                                <input type="text" required class="w-full p-3 bg-gray-800 border border-gray-700 rounded-xl text-white focus:outline-none input-fitz"
                                    placeholder="Ej: Galaxy S23">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-400 mb-2">IMEI / Serie</label>
                                <input type="text" class="w-full p-3 bg-gray-800 border border-gray-700 rounded-xl text-white focus:outline-none input-fitz" placeholder="Opcional">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-400 mb-2">Contraseña/Patrón</label>
                                <input type="text" class="w-full p-3 bg-gray-800 border border-gray-700 rounded-xl text-white focus:outline-none input-fitz" placeholder="Si aplica">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-400 mb-2">Condición física</label>
                                <select class="w-full p-3 bg-gray-800 border border-gray-700 rounded-xl text-white focus:outline-none input-fitz">
                                    <option>Buen estado</option>
                                    <option>Golpeado</option>
                                    <option>Rayado</option>
                                    <option>Con humedad</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Diagnóstico y servicio -->
                    <div class="pt-4 border-t border-gray-800">
                        <h3 class="font-bold text-lg mb-4 text-white">Diagnóstico y Servicio</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-bold text-gray-400 mb-2">Falla reportada *</label>
                                <textarea required rows="3" class="w-full p-3 bg-gray-800 border border-gray-700 rounded-xl text-white focus:outline-none input-fitz"
                                    placeholder="Describe el problema que presenta el equipo..."></textarea>
                            </div>

                            <div>
                                <label class="block text-sm font-bold text-gray-400 mb-2 text-white">Tipo de servicio *</label>
                                <div class="grid grid-cols-2 gap-3">
                                    <label
                                        class="flex items-center gap-2 p-3 bg-gray-800 border border-gray-700 rounded-xl cursor-pointer hover:bg-gray-750 transition-colors">
                                        <input type="radio" name="servicio" value="diagnostico" checked class="accent-brand"> Solo
                                        diagnóstico
                                    </label>
                                    <label
                                        class="flex items-center gap-2 p-3 bg-gray-800 border border-gray-700 rounded-xl cursor-pointer hover:bg-gray-750 transition-colors">
                                        <input type="radio" name="servicio" value="reparacion" class="accent-brand"> Reparación completa
                                    </label>
                                    <label
                                        class="flex items-center gap-2 p-3 bg-gray-800 border border-gray-700 rounded-xl cursor-pointer hover:bg-gray-750 transition-colors">
                                        <input type="radio" name="servicio" value="mantenimiento" class="accent-brand"> Mantenimiento
                                    </label>
                                    <label
                                        class="flex items-center gap-2 p-3 bg-gray-800 border border-gray-700 rounded-xl cursor-pointer hover:bg-gray-750 transition-colors">
                                        <input type="radio" name="servicio" value="urgente" class="accent-brand"> Urgente (24h)
                                    </label>
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-bold text-gray-400 mb-2">Presupuesto estimado</label>
                                <input type="number" class="w-full p-3 bg-gray-800 border border-gray-700 rounded-xl text-white focus:outline-none input-fitz" placeholder="$">
                            </div>

                            <div>
                                <label class="block text-sm font-bold text-gray-400 mb-2">Notas adicionales</label>
                                <textarea rows="2" class="w-full p-3 bg-gray-800 border border-gray-700 rounded-xl text-white focus:outline-none input-fitz"
                                    placeholder="Observaciones importantes..."></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- Accesorios recibidos -->
                    <div class="pt-4 border-t border-gray-800">
                        <h3 class="font-bold text-lg mb-4 text-white">Accesorios Recibidos</h3>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                            <label
                                class="flex items-center gap-2 p-3 bg-gray-800 border border-gray-700 rounded-xl cursor-pointer hover:bg-gray-750 transition-colors">
                                <input type="checkbox" class="accent-brand"> Funda
                            </label>
                            <label
                                class="flex items-center gap-2 p-3 bg-gray-800 border border-gray-700 rounded-xl cursor-pointer hover:bg-gray-750 transition-colors">
                                <input type="checkbox" class="accent-brand"> Mica
                            </label>
                            <label
                                class="flex items-center gap-2 p-3 bg-gray-800 border border-gray-700 rounded-xl cursor-pointer hover:bg-gray-750 transition-colors">
                                <input type="checkbox" class="accent-brand"> Cargador
                            </label>
                            <label
                                class="flex items-center gap-2 p-3 bg-gray-800 border border-gray-700 rounded-xl cursor-pointer hover:bg-gray-750 transition-colors">
                                <input type="checkbox" class="accent-brand"> Audífonos
                            </label>
                            <label
                                class="flex items-center gap-2 p-3 bg-gray-800 border border-gray-700 rounded-xl cursor-pointer hover:bg-gray-750 transition-colors">
                                <input type="checkbox" class="accent-brand"> Caja
                            </label>
                            <label
                                class="flex items-center gap-2 p-3 bg-gray-800 border border-gray-700 rounded-xl cursor-pointer hover:bg-gray-750 transition-colors">
                                <input type="checkbox" class="accent-brand"> Factura
                            </label>
                        </div>
                    </div>
                </div>

                <div class="flex gap-4 justify-end mt-8 pt-6 border-t border-gray-800">
                    <a href="admin-reparaciones.html"
                        class="px-8 py-4 rounded-xl font-bold btn-neon-gray">
                        Cancelar
                    </a>
                    <button type="submit"
                        class="w-full bg-brand text-gray-950 px-8 py-4 rounded-xl font-bold btn-neon shadow-lg shadow-brand/20">
                        🚀 Registrar Orden de Reparación
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function guardarReparacion(event) {
            event.preventDefault();
            alert('Orden de reparación creada exitosamente');
            window.location.href = 'admin-reparaciones.html';
        }
    </script>
</body>

</html>
