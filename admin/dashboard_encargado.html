<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Encargado - FitzCell</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { brand: { DEFAULT: '#07B76B' }, base: '#0a0a0b' } } } }</script>
</head>
<body class="bg-base text-gray-100 min-h-screen flex">
  <aside class="w-64 bg-gray-900 border-r border-gray-800 p-6 flex flex-col">
    <h2 class="text-2xl font-bold text-white mb-6"><span class="text-brand">⚡</span> FitzCell</h2>
    <div class="mb-4 text-xs font-bold text-brand bg-brand/10 p-2 rounded">ROL: ENCARGADO</div>
    <nav class="flex-1 space-y-2">
      <a href="#" class="block p-3 bg-brand/10 text-brand rounded-lg font-bold border border-brand/20">📊 Resumen</a>
      <a href="#" class="block p-3 text-gray-400 hover:bg-gray-800 rounded-lg">👥 Empleados</a>
      <a href="#" class="block p-3 text-gray-400 hover:bg-gray-800 rounded-lg">📦 Inventario</a>
      <a href="#" class="block p-3 text-gray-400 hover:bg-gray-800 rounded-lg">📱 Reparaciones</a>
      <a href="#" class="block p-3 text-gray-400 hover:bg-gray-800 rounded-lg">💰 Ventas</a>
    </nav>
    <button onclick="logout()" class="p-3 bg-red-900/20 text-red-400 rounded-lg font-bold hover:bg-red-900/40">Cerrar Sesión</button>
  </aside>
  <main class="flex-1 p-10">
    <h1 class="text-3xl font-bold mb-8">Dashboard <span class="text-brand">Principal</span></h1>
    <div class="grid grid-cols-3 gap-6 mb-10">
      <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl"><p class="text-gray-400 text-sm">Ventas Hoy</p><h3 class="text-2xl font-bold text-white">,250</h3></div>
      <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl"><p class="text-gray-400 text-sm">Reparaciones</p><h3 class="text-2xl font-bold text-white">12</h3></div>
      <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl"><p class="text-gray-400 text-sm">Alertas Stock</p><h3 class="text-2xl font-bold text-red-400">5</h3></div>
    </div>
    <div class="bg-gray-900 border border-gray-800 p-10 rounded-2xl text-center"><p class="text-gray-500">Módulos en construcción...</p></div>
  </main>
  <script>
    if(localStorage.getItem('rol') !== 'encargado') { window.location.href = '../login.html'; }
    function logout() { localStorage.clear(); window.location.href = '../login.html'; }
  </script>
</body>
</html>
