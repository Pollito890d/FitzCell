<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clientes CRM — FitzCell Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/styles.css" />
  <script src="../js/auth.js"></script>
  <script src="../js/data.js"></script>
  <script src="../js/sidebar.js"></script>
</head>
<body class="bg-gray-950 text-gray-100">
  <script>renderSidebar('crm');</script>

  <div class="md:ml-64 min-h-screen">
    <div class="pt-16 md:pt-0 p-6 fade-in">

      <div class="mb-8">
        <h1 class="text-2xl font-extrabold">Historial de Clientes</h1>
        <p class="text-gray-500 text-sm mt-1">Busca un cliente para ver su historial completo, deudas y garantías</p>
      </div>

      <!-- Buscador -->
      <div class="bg-gray-900 rounded-2xl border border-gray-800 p-6 mb-6">
        <div class="flex gap-3">
          <input
            id="buscarInput"
            type="text"
            placeholder="Escribe el nombre del cliente..."
            class="flex-1 bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition"
            oninput="buscarCliente()"
          />
          <button onclick="buscarCliente()" class="px-5 py-3 bg-cyan-500 hover:bg-cyan-400 text-gray-950 font-bold rounded-xl transition">
            Buscar
          </button>
        </div>
      </div>

      <!-- Resultados -->
      <div id="resultados">
        <div class="text-center py-16 text-gray-600">
          <div class="text-5xl mb-4 opacity-30">👤</div>
          <p class="text-sm">Los resultados del cliente aparecerán aquí</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const badges = { 'Diagnóstico':'badge-diagnostico','En proceso':'badge-proceso','Listo':'badge-listo','Entregado':'badge-entregado' };

    function calcGarantia(rep) {
      if (rep.estado !== 'Entregado') return null;
      const entrega = new Date(rep.fechaEstimada);
      const hoy = new Date('2026-03-14');
      const diff = Math.floor((hoy - entrega) / (1000*60*60*24));
      return rep.garantiaDias - diff;
    }

    function buscarCliente() {
      const q = document.getElementById('buscarInput').value.trim();
      const res = document.getElementById('resultados');

      if (q.length < 2) {
        res.innerHTML = `<div class="text-center py-16 text-gray-600"><div class="text-5xl mb-4 opacity-30">👤</div><p class="text-sm">Escribe al menos 2 caracteres</p></div>`;
        return;
      }

      // Agrupar reparaciones por cliente
      const clientes = {};
      FC.reparaciones.forEach(r => {
        if (r.cliente.toLowerCase().includes(q.toLowerCase())) {
          if (!clientes[r.cliente]) clientes[r.cliente] = { telefono: r.telefono, reps: [] };
          clientes[r.cliente].reps.push(r);
        }
      });

      const nombres = Object.keys(clientes);
      if (nombres.length === 0) {
        res.innerHTML = `<div class="bg-gray-900 border border-gray-800 rounded-2xl p-8 text-center text-gray-500">No se encontró ningún cliente con ese nombre.</div>`;
        return;
      }

      res.innerHTML = nombres.map(nombre => {
        const data = clientes[nombre];
        const totalDeuda = data.reps.reduce((s, r) => s + r.deuda, 0);
        const tieneDeuda = totalDeuda > 0;
        const garantiasActivas = data.reps.filter(r => {
          const d = calcGarantia(r);
          return d !== null && d > 0;
        });

        const repsHtml = data.reps.map(r => {
          const gDias = calcGarantia(r);
          let gBadge = '';
          if (r.estado === 'Entregado') {
            gBadge = gDias > 0
              ? `<span class="text-xs text-emerald-400 font-semibold">✅ Garantía ${gDias}d</span>`
              : `<span class="text-xs text-red-400">⛔ Garantía vencida</span>`;
          }
          return `
            <div class="flex items-start justify-between gap-3 py-3 border-b border-gray-800/50 last:border-0">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 flex-wrap">
                  <span class="font-mono text-cyan-400 text-xs font-bold">${r.folio}</span>
                  <span class="inline-block px-2 py-0.5 rounded-full text-xs font-bold ${badges[r.estado] || ''}">${r.estado}</span>
                  ${gBadge}
                </div>
                <div class="text-sm font-medium mt-1">${r.modelo}</div>
                <div class="text-xs text-gray-500 mt-0.5 truncate">${r.falla}</div>
                <div class="text-xs text-gray-600 mt-0.5">📅 ${r.fechaIngreso} · 🔧 ${r.tecnico}</div>
              </div>
              <div class="text-right flex-shrink-0">
                <div class="text-xs text-gray-500">Costo</div>
                <div class="font-bold text-sm">$${r.costo.toLocaleString()}</div>
                ${r.deuda > 0 ? `<div class="text-xs text-red-400 font-semibold mt-0.5">Debe $${r.deuda.toLocaleString()}</div>` : `<div class="text-xs text-emerald-400 mt-0.5">✓ Pagado</div>`}
              </div>
            </div>`;
        }).join('');

        return `
          <div class="bg-gray-900 rounded-2xl border ${tieneDeuda ? 'border-red-800/50' : 'border-gray-800'} overflow-hidden mb-4">
            <!-- Header cliente -->
            <div class="px-6 py-4 border-b border-gray-800 flex flex-wrap items-start justify-between gap-3">
              <div>
                <h3 class="font-bold text-lg">${nombre}</h3>
                <div class="text-sm text-gray-500 mt-0.5">📞 ${data.telefono || 'Sin teléfono'} · ${data.reps.length} reparación(es)</div>
              </div>
              <div class="flex flex-wrap gap-2">
                ${tieneDeuda ? `<span class="px-3 py-1.5 rounded-xl text-xs font-bold bg-red-950/50 text-red-400 border border-red-800/40">💸 Deuda: $${totalDeuda.toLocaleString()}</span>` : `<span class="px-3 py-1.5 rounded-xl text-xs font-bold bg-emerald-950/30 text-emerald-400 border border-emerald-800/30">✅ Sin deuda</span>`}
                ${garantiasActivas.length > 0 ? `<span class="px-3 py-1.5 rounded-xl text-xs font-bold bg-cyan-950/30 text-cyan-400 border border-cyan-800/30">🛡️ ${garantiasActivas.length} garantía(s) activa(s)</span>` : ''}
              </div>
            </div>
            <!-- Historial -->
            <div class="px-6 py-2">
              ${repsHtml}
            </div>
          </div>`;
      }).join('');
    }
  </script>
</body>
</html>
