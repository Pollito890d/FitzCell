<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Producto - FitzCell Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
        }

        .form-input:focus {
            border-color: #10b981;
            dynamic-range-limit: 2px solid #10b981;
        }
    </style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="styles.css">
</head>

<body class="p-8">
    <div class="max-w-3xl mx-auto">
        <div class="flex items-center gap-4 mb-8">
            <a href="admin-inventario.html" class="text-2xl hover:text-emerald-500 transition-colors">←</a>
            <h2 class="text-3xl font-bold">Nuevo Producto</h2>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
            <form onsubmit="guardarProducto(event)">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="col-span-2">
                        <label class="block text-sm font-bold text-slate-600 mb-2">Nombre del producto *</label>
                        <input type="text" required class="w-full p-3 border rounded-xl form-input"
                            placeholder="Ej: Cargador Samsung 25W">
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-600 mb-2">Categoría *</label>
                        <select required class="w-full p-3 border rounded-xl form-input">
                            <option value="">Seleccionar categoría</option>
                            <option>Cargadores</option>
                            <option>Fundas</option>
                            <option>Audio</option>
                            <option>Micas</option>
                            <option>Repuestos</option>
                            <option>Herramientas</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-600 mb-2">Precio *</label>
                        <input type="number" required min="0" step="0.01"
                            class="w-full p-3 border rounded-xl form-input" placeholder="0.00">
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-600 mb-2">Stock inicial *</label>
                        <input type="number" required min="0" class="w-full p-3 border rounded-xl form-input"
                            placeholder="0">
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-600 mb-2">Stock mínimo *</label>
                        <input type="number" required min="0" class="w-full p-3 border rounded-xl form-input"
                            placeholder="5">
                        <p class="text-xs text-slate-400 mt-1">Alerta cuando el stock esté por debajo de este número</p>
                    </div>

                    <div class="col-span-2">
                        <label class="block text-sm font-bold text-slate-600 mb-2">Descripción</label>
                        <textarea rows="4" class="w-full p-3 border rounded-xl form-input"
                            placeholder="Descripción del producto..."></textarea>
                    </div>

                    <div class="col-span-2">
                        <label class="block text-sm font-bold text-slate-600 mb-2">Proveedor</label>
                        <input type="text" class="w-full p-3 border rounded-xl form-input"
                            placeholder="Nombre del proveedor">
                    </div>

                    <div class="col-span-2">
                        <label class="block text-sm font-bold text-slate-600 mb-2">Código de barras / SKU</label>
                        <input type="text" class="w-full p-3 border rounded-xl form-input" placeholder="Opcional">
                    </div>

                    <div class="col-span-2">
                        <label class="block text-sm font-bold text-slate-600 mb-2">Imagen del producto</label>
                        <div class="border-2 border-dashed border-slate-200 rounded-xl p-8 text-center">
                            <span class="text-4xl mb-4 block">📸</span>
                            <p class="text-sm text-slate-500 mb-2">Arrastra una imagen o haz clic para seleccionar</p>
                            <button type="button"
                                class="bg-slate-100 px-4 py-2 rounded-xl text-sm font-bold hover:bg-slate-200">
                                Seleccionar archivo
                            </button>
                            <input type="file" class="hidden" accept="image/*">
                        </div>
                    </div>
                </div>

                <div class="flex gap-4 justify-end mt-8 pt-6 border-t">
                    <a href="admin-inventario.html"
                        class="px-6 py-3 border border-slate-200 rounded-xl font-bold hover:bg-slate-50 transition-colors">
                        Cancelar
                    </a>
                    <button type="submit"
                        class="px-6 py-3 bg-emerald-500 text-white rounded-xl font-bold hover:bg-emerald-600 transition-colors">
                        Guardar Producto
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function guardarProducto(event) {
            event.preventDefault();
            alert('Producto guardado exitosamente');
            window.location.href = 'admin-inventario.html';
        }
    </script>
</body>

</html>
