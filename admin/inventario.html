<!DOCTYPE html>
<html lang="es" class="bg-base">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventario — FitzCell Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#07B76B', dark: '#069D5B', light: '#23C181' },
            base: '#0a0a0b'
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="../css/styles.css" />
  <script src="../js/auth.js"></script>
  <script src="../js/data.js"></script>
  <script src="../js/sidebar.js"></script>
  <link rel="icon" type="image/svg+xml" href="../media/images/fitzcell_logo.svg" />
</head>

<body class="bg-base text-gray-100 min-h-screen">
  <script>renderSidebar('inventario');</script>

  <div class="md:ml-64 min-h-screen">
    <div class="pt-16 md:pt-0 p-6 fade-in">

      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
        <div>
          <h1 class="text-2xl font-extrabold">Inventario</h1>
          <p class="text-gray-500 text-sm mt-1">Piezas y refacciones en stock</p>
        </div>
        <div class="flex gap-3">
          <a href="nuevo-producto.html"
            class="inline-flex items-center gap-2 px-5 py-2.5 bg-gray-900 border border-gray-800 text-white font-bold rounded-xl btn-neon">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            Nuevo producto
          </a>
          <button onclick="document.getElementById('modalEntrada').classList.remove('hidden')"
            class="inline-flex items-center gap-2 px-5 py-2.5 bg-brand text-gray-950 font-bold rounded-xl btn-neon">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            Registrar entrada
          </button>
        </div>
      </div>

      <!-- Leyenda -->
      <div class="flex flex-wrap gap-3 mb-5 text-xs font-medium">
        <span class="flex items-center gap-1.5"><span
            class="w-3 h-3 rounded-full bg-red-600 inline-block"></span>Agotado (0 uds)</span>
        <span class="flex items-center gap-1.5"><span
            class="w-3 h-3 rounded-full bg-amber-600 inline-block"></span>Stock bajo (≤ mínimo)</span>
        <span class="flex items-center gap-1.5"><span
            class="w-3 h-3 rounded-full bg-emerald-600 inline-block"></span>Stock suficiente</span>
      </div>

      <!-- Filtro por categoría -->
      <div class="flex flex-wrap gap-2 mb-5" id="categBtns"></div>

      <!-- Tabla -->
      <div class="bg-gray-900 rounded-2xl border border-gray-800 overflow-hidden">
        <div class="table-wrapper">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-gray-800 text-xs text-gray-500 uppercase tracking-wider">
                <th class="text-left px-6 py-3">Pieza</th>
                <th class="text-left px-6 py-3 hidden sm:table-cell">Categoría</th>
                <th class="text-center px-6 py-3">Stock</th>
                <th class="text-center px-6 py-3 hidden md:table-cell">Mínimo</th>
                <th class="text-left px-6 py-3 hidden lg:table-cell">Proveedor</th>
                <th class="text-right px-6 py-3 hidden sm:table-cell">Precio U.</th>
                <th class="text-center px-6 py-3">Estado</th>
                <th class="text-right px-6 py-3">Acciones</th>
              </tr>
            </thead>
            <tbody id="tablaInv"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL ENTRADA -->
  <div id="modalEntrada" class="hidden fixed inset-0 z-50 flex items-center justify-center px-4 bg-black/70">
    <div class="bg-gray-900 rounded-2xl border border-gray-700 w-full max-w-md p-6">
      <div class="flex items-center justify-between mb-5">
        <h2 class="font-bold text-lg">Registrar entrada de stock</h2>
        <button onclick="document.getElementById('modalEntrada').classList.add('hidden')"
          class="text-gray-500 hover:text-white">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <form onsubmit="registrarEntrada(event)" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-400 mb-1.5">Pieza</label>
          <select id="e-pieza"
            class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white text-sm input-fitz"
            required>
            <option value="">Selecciona una pieza...</option>
          </select>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-gray-400 mb-1.5">Cantidad a sumar</label>
            <input type="number" id="e-cantidad" min="1" required
              class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white text-sm input-fitz"
              placeholder="0" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-400 mb-1.5">Precio unitario ($)</label>
            <input type="number" id="e-precio" min="0"
              class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white text-sm input-fitz"
              placeholder="0" />
          </div>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="submit" class="flex-1 bg-brand text-gray-950 font-bold py-3 rounded-xl btn-neon">Registrar
            Entrada</button>
          <button type="button" onclick="document.getElementById('modalEntrada').classList.add('hidden')"
            class="px-5 py-3 rounded-xl font-bold text-sm btn-neon-gray">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let categoriaActiva = 'Todas';

    function renderTabla(lista) {
      const tb = document.getElementById('tablaInv');
      tb.innerHTML = lista.map(i => {
        const agotado = i.cantidad === 0;
        const bajo = i.cantidad > 0 && i.cantidad <= i.minimo;
        const rowClass = agotado ? 'stock-agotado' : bajo ? 'stock-bajo' : '';
        const badge = agotado
          ? '<span class="px-2 py-0.5 rounded-full text-xs font-bold bg-red-900/80 text-red-300 border border-red-700">🔴 Agotado</span>'
          : bajo
            ? '<span class="px-2 py-0.5 rounded-full text-xs font-bold bg-amber-900/80 text-amber-300 border border-amber-700">⚠️ Bajo</span>'
            : '<span class="px-2 py-0.5 rounded-full text-xs font-bold bg-brand/20 text-brand border border-brand/50">✅ OK</span>';
        return `
          <tr class="border-b border-gray-800/50 hover:brightness-110 transition ${rowClass}">
            <td class="px-6 py-3.5 font-medium">${i.nombre}</td>
            <td class="px-6 py-3.5 hidden sm:table-cell"><span class="text-xs bg-gray-800 text-gray-400 px-2 py-1 rounded-lg">${i.categoria}</span></td>
            <td class="px-6 py-3.5 text-center font-bold text-lg ${agotado ? 'text-red-400' : bajo ? 'text-amber-400' : 'text-white'}">${i.cantidad}</td>
            <td class="px-6 py-3.5 text-center text-gray-500 hidden md:table-cell">${i.minimo}</td>
            <td class="px-6 py-3.5 text-gray-400 hidden lg:table-cell">${i.proveedor}</td>
            <td class="px-6 py-3.5 text-right hidden sm:table-cell text-gray-300">$${i.precio}</td>
             <td class="px-6 py-3.5 text-center">${badge}</td>
             <td class="px-6 py-3.5 text-right">
               <a href="editar-producto.html?id=${i.id}" class="text-xs text-gray-500 hover:text-brand transition">Editar</a>
             </td>
           </tr>`;
      }).join('');
    }

    function renderCategorias() {
      const cats = ['Todas', ...new Set(FC.inventario.map(i => i.categoria))];
      const cont = document.getElementById('categBtns');
      cont.innerHTML = cats.map(c => `
        <button onclick="filtrarCategoria('${c}')" id="cat-${c}"
          class="px-3 py-1.5 rounded-xl text-xs font-medium transition ${c === categoriaActiva ? 'bg-brand text-gray-950 btn-neon' : 'bg-gray-800 text-gray-400 hover:text-white'}">
          ${c}
        </button>`).join('');
    }

    function filtrarCategoria(cat) {
      categoriaActiva = cat;
      renderCategorias();
      const lista = cat === 'Todas' ? FC.inventario : FC.inventario.filter(i => i.categoria === cat);
      renderTabla(lista);
    }

    // Select del modal no se llena hasta cargar datos

    function registrarEntrada(e) {
      e.preventDefault();
      const id = parseInt(document.getElementById('e-pieza').value);
      const cant = parseInt(document.getElementById('e-cantidad').value);
      const precio = parseFloat(document.getElementById('e-precio').value);
      const item = FC.inventario.find(i => i.id === id);
      if (item) {
        item.cantidad += cant;
        if (precio) item.precio = precio;
      }
      document.getElementById('modalEntrada').classList.add('hidden');
      document.getElementById('e-pieza').value = '';
      document.getElementById('e-cantidad').value = '';
      document.getElementById('e-precio').value = '';
      filtrarCategoria(categoriaActiva);
    }

    // Inicial
    document.addEventListener('DOMContentLoaded', async () => {
      await FC.loadData();

      const sel = document.getElementById('e-pieza');
      FC.inventario.forEach(i => {
        sel.innerHTML += `<option value="${i.id}">${i.nombre}</option>`;
      });

      renderCategorias();
      renderTabla(FC.inventario);
    });
  </script>
</body>

</html>
