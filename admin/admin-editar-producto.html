<!DOCTYPE html>
<html lang="es" class="bg-gray-950">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Producto - FitzCell Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { DEFAULT: '#07B76B', dark: '#069D5B', light: '#23C181' },
                        base: '#0a0a0b'
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="icon" type="image/svg+xml" href="../media/images/fitzcell_logo.svg" />
</head>

<body class="p-8 bg-base text-gray-100 min-h-screen">
    <div class="max-w-3xl mx-auto">
        <div class="flex items-center gap-4 mb-8">
            <a href="admin-inventario.html" class="text-2xl hover:text-brand transition-colors">←</a>
            <h2 class="text-3xl font-bold">Editar Producto</h2>
            <span class="text-sm bg-gray-800 text-gray-400 px-3 py-1 rounded-full font-bold border border-gray-700" id="producto-id">ID: —</span>
        </div>

        <div class="bg-gray-900 p-8 rounded-3xl shadow-lg shadow-black/20 border border-gray-800">
            <form onsubmit="actualizarProducto(event)">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="col-span-2">
                        <label class="block text-sm font-bold text-gray-400 mb-2">Nombre del producto *</label>
                        <input type="text" id="p-nombre" required class="w-full bg-gray-800 border-gray-700 p-3 rounded-xl text-white focus:outline-none input-fitz">
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-400 mb-2">Categoría *</label>
                        <select id="p-categoria" required class="w-full bg-gray-800 border-gray-700 p-3 rounded-xl text-white focus:outline-none input-fitz">
                            <option value="">Seleccionar categoría</option>
                            <option value="Pantallas">Pantallas</option>
                            <option value="Baterías">Baterías</option>
                            <option value="Cargadores">Cargadores</option>
                            <option value="Fundas">Fundas</option>
                            <option value="Audio">Audio</option>
                            <option value="Micas">Micas</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-400 mb-2">Precio *</label>
                        <input type="number" id="p-precio" required min="0" step="0.01" class="w-full bg-gray-800 border-gray-700 p-3 rounded-xl text-white focus:outline-none input-fitz">
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-400 mb-2">Stock actual *</label>
                        <input type="number" id="p-stock" required min="0" class="w-full bg-gray-800 border-gray-700 p-3 rounded-xl text-white focus:outline-none input-fitz">
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-400 mb-2">Stock mínimo *</label>
                        <input type="number" id="p-minimo" required min="0" class="w-full bg-gray-800 border-gray-700 p-3 rounded-xl text-white focus:outline-none input-fitz">
                    </div>

                    <div class="col-span-2">
                        <label class="block text-sm font-bold text-gray-400 mb-2">Descripción</label>
                        <textarea id="p-desc" rows="4" class="w-full bg-gray-800 border-gray-700 p-3 rounded-xl text-white focus:outline-none input-fitz resize-none"></textarea>
                    </div>

                    <div class="col-span-2">
                        <label class="block text-sm font-bold text-gray-400 mb-2">Proveedor</label>
                        <input type="text" id="p-proveedor" class="w-full bg-gray-800 border-gray-700 p-3 rounded-xl text-white focus:outline-none input-fitz">
                    </div>

                    <div class="col-span-2">
                        <label class="block text-sm font-bold text-gray-400 mb-2">Código de barras / SKU</label>
                        <input type="text" id="p-sku" class="w-full bg-gray-800 border-gray-700 p-3 rounded-xl text-white focus:outline-none input-fitz">
                    </div>
                </div>

                <div class="flex gap-4 justify-end mt-8 pt-6 border-t border-gray-800">
                    <button type="button" onclick="eliminarProducto()" class="px-8 py-4 rounded-xl font-bold btn-neon-red">Eliminar</button>
                    <a href="admin-inventario.html" class="px-8 py-4 rounded-xl font-bold btn-neon-gray">Cancelar</a>
                    <button type="submit" class="px-6 py-3 rounded-xl font-bold btn-neon">🔄 Actualizar Producto</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productoId = urlParams.get('id') || 1;
        document.getElementById('producto-id').textContent = 'ID: ' + productoId;

        async function loadProducto() {
            try {
                const res = await fetch(`/api/inventario/${productoId}`);
                if (res.ok) {
                    const p = await res.json();
                    document.getElementById('p-nombre').value = p.nombre;
                    document.getElementById('p-categoria').value = p.categoria;
                    document.getElementById('p-precio').value = p.precio;
                    document.getElementById('p-stock').value = p.stock || p.cantidad;
                    document.getElementById('p-minimo').value = p.minimo;
                    document.getElementById('p-desc').value = p.descripcion || '';
                    document.getElementById('p-proveedor').value = p.proveedor || '';
                    document.getElementById('p-sku').value = p.sku || '';
                }
            } catch (e) { console.log('Producto local'); }
        }

        async function actualizarProducto(event) {
            event.preventDefault();
            alert('Producto actualizado exitosamente');
            window.location.href = 'admin-inventario.html';
        }

        function eliminarProducto() {
            if (confirm('¿Estás seguro de eliminar este producto? Esta acción no se puede deshacer.')) {
                alert('Producto eliminado');
                window.location.href = 'admin-inventario.html';
            }
        }

        loadProducto();
    </script>
</body>

</html>
