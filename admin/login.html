<!DOCTYPE html>
<html lang="es" class="bg-gray-950">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso Administrador — FitzCell</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#07B76B', dark: '#069D5B', light: '#23C181' },
            base: '#0a0a0b'
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="icon" type="image/svg+xml" href="../media/images/fitzcell_logo.svg" />
</head>

<body class="bg-base text-gray-100 min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-md animate-pop">
    <!-- Logo -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center gap-4 mb-4">
        <img src="../media/images/fitzcell_logo.svg" alt="FitzCell Logo" class="h-16 w-auto mx-auto object-contain">
        <span class="font-black text-3xl tracking-tighter">Fitz<span class="text-brand">Cell</span></span>
      </div>
      <p class="text-gray-500 text-xs font-bold uppercase tracking-widest">Panel de administración · Acceso privado</p>
    </div>

    <!-- Card de login -->
    <div class="bg-gray-900 rounded-3xl border border-gray-800 p-10 shadow-2xl shadow-black/50">
      <h1 class="text-xl font-black mb-8 text-center text-white">Iniciar sesión</h1>

      <div id="errorMsg"
        class="hidden bg-rose-950/30 border border-rose-900/50 rounded-2xl px-4 py-4 mb-6 text-rose-500 text-xs font-bold text-center uppercase tracking-widest">
        ❌ Usuario o contraseña incorrectos
      </div>

      <form onsubmit="handleLogin(event)" class="space-y-6">
        <div>
          <label class="block text-[10px] font-black text-gray-500 mb-2 uppercase tracking-widest" for="email">Canal Seguro (Email)</label>
          <input id="email" type="email" placeholder="admin@fitzcell.com" autocomplete="email" required
            class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4 text-white placeholder-gray-600 focus:outline-none input-fitz transition-all font-medium" />
        </div>
        <div>
          <label class="block text-[10px] font-black text-gray-500 mb-2 uppercase tracking-widest" for="password">Credencial (Password)</label>
          <div class="relative">
            <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"
              class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4 text-white placeholder-gray-600 focus:outline-none input-fitz transition-all pr-14 font-medium" />
            <button type="button" onclick="togglePass()"
              class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-white transition-colors">
              <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
            </button>
          </div>
        </div>

        <button type="submit"
          class="w-full py-4 bg-brand text-gray-950 font-black rounded-2xl btn-neon shadow-lg shadow-brand/10 uppercase tracking-widest text-sm">
          Ingresar al Sistema →
        </button>
      </form>

      <p class="text-center text-[10px] font-bold text-gray-700 mt-8 tracking-widest uppercase">Monitoreo activo para seguridad</p>
    </div>

    <div class="text-center mt-8">
      <a href="../index.html" class="text-xs font-bold text-gray-600 hover:text-brand transition-colors uppercase tracking-widest">← Volver al sitio público</a>
    </div>
  </div>

  <script>
    // Si ya está autenticado, ir directo al dashboard
    if (sessionStorage.getItem("fc_admin") === "authenticated") {
      window.location.href = "dashboard.html";
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const pass = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.classList.add('hidden');

      try {
        const res = await fetch('http://localhost:3000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: pass })
        });

        if (res.ok) {
          const data = await res.json();
          sessionStorage.setItem("fc_admin", "authenticated");
          sessionStorage.setItem("fc_user_info", JSON.stringify(data.user));
          window.location.href = "dashboard.html";
        } else {
          errorMsg.textContent = '❌ Credenciales inválidas';
          errorMsg.classList.remove('hidden');
          document.getElementById('password').value = '';
        }
      } catch (err) {
        console.error("Error al iniciar sesión:", err);
        // Simulación para prototipo si el servidor no está corriendo
        if (email === 'admin@fitzcell.com' && pass === 'admin') {
           sessionStorage.setItem("fc_admin", "authenticated");
           window.location.href = "dashboard.html";
        } else {
           errorMsg.textContent = '❌ Error de enlace de datos';
           errorMsg.classList.remove('hidden');
        }
      }
    }

    function togglePass() {
      const inp = document.getElementById('password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>

</html>
